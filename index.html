<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0b0e13">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Topspin">
<link rel="manifest" href="manifest.webmanifest">
<title>TOPSPIN — l'entraînement du pongiste</title>
<style>
  :root{
    --bg:#0b0e13; --bg2:#12161d; --bg3:#1a202b; --line:#262e3c;
    --txt:#eef1f5; --dim:#8d97a7;
    --acc:#ff8a2e; --accd:#d96f1e; --blu:#3b74e0;
    --ok:#25c47f; --bad:#f4506a;
    --r:14px;
    --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overscroll-behavior:none}
  #app{max-width:520px;margin:0 auto;min-height:100%;display:flex;flex-direction:column}
  main{flex:1;padding:16px 16px 92px}
  header{padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}
  .logo{font-weight:900;font-size:19px;letter-spacing:.5px;font-style:italic}
  .logo span{color:var(--acc)}
  .logo em{font-style:normal;font-size:15px;margin-left:4px}
  .hbadge{font-family:var(--mono);font-weight:700;font-size:11.5px;background:var(--bg2);border:1px solid var(--line);padding:6px 10px;border-radius:9px;color:var(--dim)}
  .hbadge b{color:var(--acc)}

  h1.page{font-size:23px;font-weight:900;font-style:italic;letter-spacing:.3px;margin-bottom:4px}
  h2.sec{font-size:12px;text-transform:uppercase;letter-spacing:1.6px;color:var(--dim);margin:18px 0 8px;display:flex;align-items:center;gap:10px}
  h2.sec::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}
  .sub{color:var(--dim);font-size:13px;margin-bottom:14px;line-height:1.5}
  .card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:12px}

  .hero{background:linear-gradient(135deg,#14202e,#1c1710);border:1px solid #3a3020;border-top:3px solid var(--acc);border-radius:var(--r);padding:16px;margin-bottom:12px}
  .hero .lab{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--acc);font-weight:800}
  .hero .big{font-family:var(--mono);font-size:24px;font-weight:800;margin:4px 0 2px}
  .hero .xs{font-size:12px;color:var(--dim)}

  .coach{background:var(--bg2);border-left:3px solid var(--acc);border-radius:0 var(--r) var(--r) 0;padding:13px 14px;margin-bottom:12px;font-size:14px;line-height:1.55}
  .coach b{color:var(--acc)}

  .act{display:flex;align-items:center;gap:11px;background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);padding:13px;margin-bottom:8px;cursor:pointer}
  .act:active{background:var(--bg3)}
  .act .ico{width:38px;height:38px;border-radius:11px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .act .t{flex:1;min-width:0}
  .act .t b{display:block;font-size:14px}
  .act .t small{color:var(--dim);font-size:12px;line-height:1.35;display:block;margin-top:1px}
  .act .st{font-size:15px;flex-shrink:0;color:var(--dim);font-family:var(--mono);font-weight:700}
  .act.done{opacity:.55}
  .act.done .st{color:var(--ok)}
  .act.hot{border-color:#3a3020;background:linear-gradient(135deg,#141a26,#1c1712)}

  .chips{display:flex;flex-wrap:wrap;gap:7px;margin:10px 0 4px}
  .chips button{background:var(--bg3);border:1px solid var(--line);color:var(--txt);border-radius:20px;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer}
  .chips button.on{background:var(--acc);color:#1c1000;border-color:var(--acc)}
  .chips button.blu{border-color:#27406e}
  .chips button.blu.on{background:var(--blu);color:#fff;border-color:var(--blu)}

  .btn{display:block;border:none;border-radius:12px;padding:14px 20px;font-size:15px;font-weight:800;cursor:pointer;background:var(--acc);color:#1c1000;width:100%;text-align:center;margin-top:12px}
  .btn:active{transform:scale(.97)}
  .btn.ghost{background:var(--bg3);color:var(--txt);border:1px solid var(--line)}
  .btn.blu{background:var(--blu);color:#fff}
  .btn[disabled]{opacity:.4;pointer-events:none}
  .danger{color:var(--bad);background:none;border:1px solid #55232c;border-radius:12px;width:100%;padding:12px;font-size:13px;font-weight:700;cursor:pointer;margin-top:10px}

  #ov{position:fixed;inset:0;background:var(--bg);z-index:50;display:none;overflow-y:auto}
  #ov.on{display:block}
  #ov .inner{max-width:520px;margin:0 auto;padding:14px 16px 60px}
  #ov .top{display:flex;align-items:center;gap:10px;margin-bottom:14px;position:sticky;top:0;background:var(--bg);padding:8px 0;z-index:5}
  #ov .top .x{width:36px;height:36px;border-radius:11px;background:var(--bg2);border:1px solid var(--line);color:var(--txt);font-size:16px;cursor:pointer;flex-shrink:0}
  #ov .top b{font-size:16.5px;flex:1;font-weight:800}
  #ov .top .timer{font-family:var(--mono);font-size:15px;font-weight:800;color:var(--acc);background:var(--bg2);border:1px solid #3a3020;padding:6px 11px;border-radius:9px}

  .story p{font-size:14.5px;line-height:1.65;color:#dde1e8;margin-bottom:12px}
  .meta{color:var(--dim);font-size:12.5px;margin-bottom:12px}
  .tag{display:inline-block;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;background:var(--bg3);color:var(--acc);border:1px solid #3a3020;padding:3px 8px;border-radius:6px;margin-right:6px}
  .tag.b{color:var(--blu);border-color:#27406e}

  .pt{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px 13px;font-size:13.5px;line-height:1.55;color:#d8dce3;margin-bottom:8px}
  .pt b{color:var(--acc)}
  .crit{background:#12201a;border:1px solid #1e4a36;border-radius:12px;padding:12px 13px;font-size:13.5px;line-height:1.5;margin-top:4px}
  .crit b{color:var(--ok)}

  textarea,input[type=text],input[type=number]{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:12px;color:var(--txt);padding:12px;font-size:14px;font-family:inherit;line-height:1.5}
  textarea{min-height:80px;resize:vertical}
  textarea:focus,input:focus{outline:none;border-color:var(--acc)}
  label.f{display:block;font-size:12px;color:var(--dim);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin:12px 0 5px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}

  .result{text-align:center;padding:26px 10px}
  .result .big{font-family:var(--mono);font-size:42px;font-weight:800}
  .result p{color:var(--dim);font-size:14px;margin-top:8px;line-height:1.5}

  nav{position:fixed;bottom:0;left:0;right:0;background:rgba(11,14,19,.95);backdrop-filter:blur(12px);border-top:1px solid var(--line);z-index:40}
  nav .in{max-width:520px;margin:0 auto;display:flex}
  nav button{flex:1;background:none;border:none;color:var(--dim);font-size:10.5px;font-weight:700;padding:9px 0 max(9px,env(safe-area-inset-bottom));cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
  nav button i{font-style:normal;font-size:19px}
  nav button.on{color:var(--acc)}

  .statgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
  .stat{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);padding:13px;text-align:center}
  .stat b{font-family:var(--mono);font-size:21px;display:block}
  .stat small{font-family:var(--mono);color:var(--dim);font-size:10px;letter-spacing:.6px}

  .hm{display:grid;grid-auto-flow:column;grid-template-rows:repeat(7,12px);gap:3px;justify-content:start;margin-top:10px;overflow-x:auto;padding-bottom:4px}
  .hm i{width:12px;height:12px;border-radius:3px;background:var(--bg3)}
  .hm i.on{background:var(--acc)}
  .hm i.today{outline:1px solid var(--dim)}

  .form5{display:flex;gap:5px;justify-content:center;margin-top:4px}
  .form5 i{width:22px;height:22px;border-radius:6px;font-style:normal;font-family:var(--mono);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center}
  .form5 i.w{background:#14352a;color:var(--ok)}
  .form5 i.l{background:#341a22;color:var(--bad)}

  .clockbig{font-family:var(--mono);font-size:56px;font-weight:800;text-align:center;margin:18px 0 6px;font-variant-numeric:tabular-nums}
  .clocklab{text-align:center;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:14px}
  .clocklab.work{color:var(--acc)} .clocklab.rest{color:var(--blu)}

  .chk{display:flex;gap:10px;align-items:flex-start;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px 13px;margin-bottom:7px;cursor:pointer;font-size:13.5px;line-height:1.45}
  .chk input{margin-top:2px;accent-color:var(--acc);width:17px;height:17px;flex-shrink:0}
  .chk.on{opacity:.55;text-decoration:line-through}

  #toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(20px);background:#1c1712;border:1px solid #3a3020;color:var(--txt);padding:12px 18px;border-radius:12px;font-size:14px;font-weight:600;z-index:60;opacity:0;pointer-events:none;transition:all .25s;max-width:90%;text-align:center}
  #toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast b{color:var(--acc)}

  .arena{position:relative;height:54vh;min-height:330px;background:var(--bg2);border:1px solid var(--line);border-radius:16px;overflow:hidden;touch-action:manipulation;user-select:none;-webkit-user-select:none;cursor:pointer}
  .arena .msg{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;padding:20px;pointer-events:none}
  .arena .big2{font-family:var(--mono);font-size:38px;font-weight:800}
  .arena .big2.bad{color:var(--bad)} .arena .big2.ok{color:var(--ok)}
  .lights{display:flex;gap:10px;justify-content:center;margin-bottom:8px}
  .lights i{width:42px;height:42px;border-radius:50%;background:#222833;border:2px solid #323b4a;transition:background .1s}
  .lights i.on{background:#e33045;border-color:#ff6b7c;box-shadow:0 0 18px #e3304599}
  .tgt{position:absolute;width:58px;height:58px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#ffd9b0,var(--acc) 65%);box-shadow:0 4px 14px #0008;display:flex;align-items:center;justify-content:center;font-size:25px;z-index:3}
  .stim{position:absolute;left:50%;top:44%;transform:translate(-50%,-50%);width:90px;height:90px;border-radius:50%;z-index:2;box-shadow:0 6px 20px #0009}
  .stim.b{background:radial-gradient(circle at 35% 30%,#9fc0ff,var(--blu) 65%)}
  .stim.o{background:radial-gradient(circle at 35% 30%,#ffd9b0,var(--acc) 65%)}
  .stim.g{background:radial-gradient(circle at 35% 30%,#9df0c8,var(--ok) 65%)}
  .stim.r{background:radial-gradient(circle at 35% 30%,#ffb0bc,var(--bad) 65%)}
  .halfL,.halfR{position:absolute;top:0;bottom:0;width:50%;opacity:.07;pointer-events:none}
  .halfL{left:0;background:var(--blu)} .halfR{right:0;background:var(--acc)}
  .cornerL,.cornerR{position:absolute;bottom:10px;font-family:var(--mono);font-size:10px;letter-spacing:1px;color:var(--dim);pointer-events:none}
  .cornerL{left:12px} .cornerR{right:12px}
  .rxhud{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11.5px;color:var(--dim);margin-top:8px;letter-spacing:.4px}
  .rxhud b{color:var(--acc)}

  .gift{background:linear-gradient(160deg,#14202e,#1c1712);border:1px solid #3a3020;border-radius:18px;padding:26px 20px;text-align:center}
  .gift .ball{font-size:46px}
  .gift h3{font-size:20px;font-weight:900;font-style:italic;margin:10px 0 8px}
  .gift p{color:#d8dce3;font-size:14px;line-height:1.6}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">TOP<span>SPIN</span> <em>🏓</em></div>
    <div class="hbadge">SEM <b id="hweek">0/4</b></div>
  </header>
  <main id="main"></main>
</div>

<div id="ov"><div class="inner" id="ovin"></div></div>
<div id="toast"></div>

<nav><div class="in">
  <button data-v="seance"><i>🏓</i>Séance</button>
  <button data-v="exos"><i>📚</i>Exos</button>
  <button data-v="matchs"><i>🏆</i>Matchs</button>
  <button data-v="carnet"><i>📈</i>Carnet</button>
  <button data-v="reflex"><i>🎮</i>Réflexes</button>
  <button data-v="plus"><i>⚙️</i>Plus</button>
</div></nav>

<script src="data-tt.js"></script>
<script>
// ================= ÉTAT =================
const KEY="topspin_v1";
const DEF={name:"",goal:4,sessions:[],matches:[],check:{date:"",arr:[]},welcomed:false,reflex:{f1:[],targets:[],choice:[],gonogo:[]},gear:{cd:{n:"",d:""},rv:{n:"",d:""}},as:null};
let S=load();
function load(){
  let s={}; try{ s=JSON.parse(localStorage.getItem(KEY))||{}; }catch(e){}
  const o=Object.assign({},DEF,s);
  o.sessions=s.sessions||[]; o.matches=s.matches||[]; o.check=s.check||{date:"",arr:[]};
  o.reflex=Object.assign({f1:[],targets:[],choice:[],gonogo:[]},s.reflex||{});
  o.gear=Object.assign({cd:{n:"",d:""},rv:{n:"",d:""}},s.gear||{});
  o.as=s.as||null;
  return o;
}
// Écran allumé pendant les séances et le timer (wake lock, si supporté)
let WL=null;
async function wakeOn(){ try{ if("wakeLock" in navigator) WL=await navigator.wakeLock.request("screen"); }catch(e){} }
function wakeOff(){ try{ if(WL) WL.release(); }catch(e){} WL=null; }
function buzz(p){ try{ if(navigator.vibrate) navigator.vibrate(p); }catch(e){} }
function save(){ localStorage.setItem(KEY,JSON.stringify(S)); }
function today(){ return new Date().toISOString().slice(0,10); }
function esc(x){ return String(x??"").replace(/</g,"&lt;"); }
function drill(id){ return DRILLS.find(d=>d.id===id); }
function cat(id){ return CATS.find(c=>c.id===id); }
function mondayOf(dstr){ const d=new Date(dstr); const day=(d.getDay()+6)%7; d.setDate(d.getDate()-day); return d.toISOString().slice(0,10); }
function weekSessions(){ const mon=mondayOf(today()); return S.sessions.filter(x=>x.d>=mon); }
function header(){ document.getElementById("hweek").innerHTML=weekSessions().length+"/"+S.goal; }
let toastT=null;
function toast(html){ const t=document.getElementById("toast"); t.innerHTML=html; t.classList.add("on"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("on"),3000); }

// ================= NAV =================
let view="seance";
function nav(v){ view=v; document.querySelectorAll("nav button").forEach(b=>b.classList.toggle("on",b.dataset.v===v)); render(); window.scrollTo(0,0); }
document.querySelectorAll("nav button").forEach(b=>b.onclick=()=>nav(b.dataset.v));
function render(){
  document.getElementById("main").innerHTML=({seance:vSeance,exos:vExos,matchs:vMatchs,carnet:vCarnet,reflex:vReflex,plus:vPlus})[view]();
  header();
}
const ov=document.getElementById("ov"),ovin=document.getElementById("ovin");
function openOv(html){ ovin.innerHTML=html; ov.classList.add("on"); ov.scrollTop=0; }
function closeOv(){ ov.classList.remove("on"); stopClock(); rxStop(); stopTT(); wakeOff(); render(); }
function ovTop(title,timer){ return `<div class="top"><button class="x" onclick="closeOv()">✕</button><b>${title}</b>${timer?'<span class="timer" id="ovclock">00:00</span>':""}</div>`; }

// ================= GÉNÉRATEUR DE SÉANCE =================
let GEN={dur:90,focus:[]};
const FOCUS=[["services","Services"],["remise","Remise"],["cd","Top CD"],["rv","Revers"],["jambes","Jambes"],["bloc","Bloc/contre"],["schemas","Schémas"],["match","Match"],["physique","Physique"]];
function vSeance(){
  const ws=weekSessions().length;
  const name=S.name?`, ${S.name}`:"";
  const coachTxt = ws>=S.goal
    ? `Objectif hebdo atteint (<b>${ws}/${S.goal}</b>). Les séances bonus, c'est du bonus — écoute le corps.`
    : ws===0
    ? `Nouvelle semaine${name}. <b>${S.goal} séances</b> au programme — la première est toujours celle qui compte.`
    : `<b>${ws}/${S.goal}</b> cette semaine. La régularité bat le talent quand le talent ne s'entraîne pas.`;
  return `
  <h1 class="page">Construire la séance</h1>
  <div class="sub">Choisis la durée et le thème du jour — le plan se construit tout seul : échauffement, gammes, thème, situations, retour au calme.</div>
  <div class="coach">${coachTxt}</div>
  ${AS?`<div class="act hot" onclick="openGuided()">
    <div class="ico">${AS.start?"▶️":"📋"}</div><div class="t"><b>${AS.start?"Séance en cours — reprendre":"Plan de séance prêt — le voir"}</b><small>${AS.plan.length} blocs · ${AS.done.length} coché${AS.done.length>1?"s":""}${AS.start?"":" · chrono pas encore démarré"}</small></div>
    <div class="st">›</div>
  </div>`:""}
  <div class="card">
    <label class="f">Durée</label>
    <div class="chips">${[45,60,90,120].map(d=>`<button class="${GEN.dur===d?"on":""}" onclick="GEN.dur=${d};render()">${d} min</button>`).join("")}</div>
    <label class="f">Thème(s) du jour — 1 à 3</label>
    <div class="chips">${FOCUS.map(f=>`<button class="blu ${GEN.focus.includes(f[0])?"on":""}" onclick="togFocus('${f[0]}')">${f[1]}</button>`).join("")}</div>
    <button class="btn" ${GEN.focus.length?"":"disabled"} onclick="genSession()">Générer la séance</button>
  </div>
  <div class="act hot" onclick="quickLog()">
    <div class="ico">✍️</div><div class="t"><b>Séance libre — juste noter</b><small>tu t'es entraîné sans plan ? Enregistre durée + contenu au carnet.</small></div>
    <div class="st">›</div>
  </div>
  <div class="act" onclick="openChecklist()">
    <div class="ico">✅</div><div class="t"><b>Checklist d'avant-match</b><small>la routine des 30 dernières minutes, à cocher.</small></div>
    <div class="st">›</div>
  </div>`;
}
function togFocus(f){
  if(GEN.focus.includes(f)) GEN.focus=GEN.focus.filter(x=>x!==f);
  else{ if(GEN.focus.length>=3) return toast("3 thèmes maximum — une séance qui vise tout ne travaille rien."); GEN.focus.push(f); }
  render();
}
function pick(arr,n){ const a=[...arr].sort(()=>Math.random()-.5); return a.slice(0,n); }
function genSession(){
  const dur=GEN.dur, F=GEN.focus;
  const plan=[];
  const add=(label,drills,budget)=>{
    if(!drills.length||budget<4) return;
    const w=drills.reduce((s,d)=>s+d.dur,0);
    drills.forEach(d=>plan.push({id:d.id,min:Math.max(4,Math.round(budget*d.dur/w)),label}));
  };
  add("Échauffement",[...pick(DRILLS.filter(d=>["e1","e2"].includes(d.id)),1),...pick(DRILLS.filter(d=>["e3","e4"].includes(d.id)),dur>=90?2:1)],Math.round(dur*0.15));
  add("Gammes",pick(DRILLS.filter(d=>d.cat==="gammes"),dur>=90?2:1),Math.round(dur*0.12));
  const themePool=DRILLS.filter(d=>F.includes(d.cat)&&!["e1","e2","e3","e4"].includes(d.id));
  add("Thème du jour",pick(themePool,Math.min(dur>=120?4:dur>=90?3:2,themePool.length)),Math.round(dur*0.43));
  const situ=[...pick(DRILLS.filter(d=>d.cat==="schemas"),1),...(dur>=90?pick(DRILLS.filter(d=>d.cat==="match"),1):[])];
  add("Situations",situ,Math.round(dur*0.20));
  add("Retour au calme",DRILLS.filter(d=>d.cat==="retour"),Math.round(dur*0.10));
  AS={plan,done:[],start:null,focus:[...F],dur};
  persistAS();
  openGuided();
}
function persistAS(){ S.as=AS; save(); }

// ================= SÉANCE GUIDÉE =================
let AS=S.as||null,CLK=null;
function fmtClock(s){ return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0"); }
function startClock(){ stopClock(); CLK=setInterval(()=>{ const el=document.getElementById("ovclock"); if(el&&AS) el.textContent=fmtClock(Math.floor((Date.now()-AS.start)/1000)); },1000); }
function stopClock(){ if(CLK){clearInterval(CLK);CLK=null;} }
function openGuided(){
  if(!AS) return;
  const total=AS.plan.reduce((s,b)=>s+b.min,0);
  let lastLabel="";
  openOv(ovTop(AS.start?"Séance en cours":"Le plan de séance",!!AS.start)+`
    <div class="sub">${total} min planifiées · ${AS.focus.map(f=>FOCUS.find(x=>x[0]===f)[1]).join(" + ")}. ${AS.start?"Coche au fur et à mesure — touche un exercice pour revoir la consigne.":"Relis le plan, régénère si besoin — le chrono ne démarre que quand TOI tu démarres."}</div>`+

let TT={on:false,work:30,rest:30,rounds:8,cur:0,phase:"work",left:0,iv:null};
function beep(freq,ms){
  try{ const ctx=beep.ctx||(beep.ctx=new (window.AudioContext||window.webkitAudioContext)());
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.frequency.value=freq; o.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(.25,ctx.currentTime);
    o.start(); o.stop(ctx.currentTime+ms/1000);
  }catch(e){}
}
function openTimer(){
  stopTT();
  openOv(ovTop("Timer intervalles")+`
    <div class="row2">
      <div><label class="f">Travail (s)</label><input type="number" id="tW" value="${TT.work}" min="5" max="600"></div>
      <div><label class="f">Repos (s)</label><input type="number" id="tR" value="${TT.rest}" min="0" max="600"></div>
    </div>
    <label class="f">Rounds</label><input type="number" id="tN" value="${TT.rounds}" min="1" max="50">
    <div class="clockbig" id="ttClock">${fmtClock(TT.work)}</div>
    <div class="clocklab" id="ttLab">PRÊT</div>
    <button class="btn" id="ttBtn" onclick="startTT()">Démarrer</button>
    <button class="btn ghost" onclick="stopTT();openTimer()">Réinitialiser</button>
    <div class="coach">Multiball : 30/30 × 8. Shadow : 30/30 × 6. Physique : 40/20 × 10. Le bip change de ton entre travail et repos.</div>`);
}
function startTT(){
  TT.work=parseInt(document.getElementById("tW").value)||30;
  TT.rest=parseInt(document.getElementById("tR").value)||0;
  TT.rounds=parseInt(document.getElementById("tN").value)||8;
  TT.cur=1; TT.phase="work"; TT.left=TT.work; TT.on=true;
  wakeOn(); beep(880,180); buzz(120);
  document.getElementById("ttBtn").textContent="Round 1 / "+TT.rounds;
  TT.iv=setInterval(tickTT,1000);
}
function tickTT(){
  TT.left--;
  const c=document.getElementById("ttClock"),l=document.getElementById("ttLab"),b=document.getElementById("ttBtn");
  if(!c){ stopTT(); return; }
  if(TT.left<=0){
    if(TT.phase==="work"&&TT.rest>0){ TT.phase="rest"; TT.left=TT.rest; beep(440,300); buzz([60,60,60]); }
    else{
      if(TT.cur>=TT.rounds){ stopTT(); wakeOff(); c.textContent="00:00"; l.textContent="TERMINÉ 🏁"; l.className="clocklab"; beep(880,150); setTimeout(()=>beep(880,150),200); setTimeout(()=>beep(1320,400),450); buzz([150,80,150,80,300]); return; }
      TT.cur++; TT.phase="work"; TT.left=TT.work; beep(880,180); buzz(120);
    }
  }
  c.textContent=fmtClock(TT.left);
  l.textContent=TT.phase==="work"?"TRAVAIL":"REPOS";
  l.className="clocklab "+TT.phase;
  if(b) b.textContent="Round "+TT.cur+" / "+TT.rounds;
  if(TT.phase==="work"&&TT.left<=3&&TT.left>0) beep(660,90);
}
function stopTT(){ if(TT.iv){clearInterval(TT.iv);TT.iv=null;} TT.on=false; }

// ================= RÉFLEXES =================
let RX=null;
function rxStop(){ if(RX){ clearInterval(RX.iv); clearTimeout(RX.to); clearTimeout(RX.to2); RX=null; } }
function pushReflex(g,v){ S.reflex[g].unshift({d:today(),v}); S.reflex[g]=S.reflex[g].slice(0,100); save(); }
function rstat(g){
  const a=S.reflex[g]; if(!a.length) return null;
  const best=Math.min(...a.map(x=>x.v));
  const avg=Math.round(a.slice(0,10).reduce((s,x)=>s+x.v,0)/Math.min(a.length,10));
  return {best,avg,n:a.length};
}
const RXGAMES=[
 {id:"f1",ico:"🏎️",name:"Feu de F1",desc:"5 feux s'allument puis s'éteignent d'un coup : tape à l'extinction. Faux départ pénalisé, comme en course.",fn:"playF1"},
 {id:"targets",ico:"🏓",name:"Chasse aux balles",desc:"20 balles surgissent une à une, n'importe où. Œil + main, le duo qui fait les demi-volées.",fn:"playTgt"},
 {id:"choice",ico:"🧭",name:"Choix CD / Revers",desc:"Bleue → moitié gauche (revers). Orange → moitié droite (coup droit). Décider ET réagir — le réflexe du pongiste.",fn:"playChoice"},
 {id:"gonogo",ico:"🚦",name:"Go / No-Go",desc:"Verte : frappe vite. Rouge : ne bouge pas. L'art de ne pas attaquer la mauvaise balle.",fn:"playGng"}
];
function spark(g){
  const a=S.reflex[g].slice(0,15).reverse().map(x=>x.v);
  if(a.length<3) return "";
  const mn=Math.min(...a),mx=Math.max(...a),rg=(mx-mn)||1;
  const pts=a.map((v,i)=>((i/(a.length-1))*100).toFixed(1)+","+(24-((v-mn)/rg)*18).toFixed(1)).join(" ");
  return `<svg viewBox="0 0 100 28" style="width:100%;height:28px;margin-top:9px" preserveAspectRatio="none">
    <polyline points="${pts}" fill="none" stroke="var(--acc)" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
  </svg><div style="font-family:var(--mono);font-size:9.5px;color:var(--dim);letter-spacing:.4px">${a.length} DERNIERS — PLUS BAS = PLUS RAPIDE</div>`;
}
function vReflex(){
  return `<h1 class="page">Salle de réflexes</h1>
  <div class="sub">Le temps de réaction se travaille comme un coup droit : souvent, peu, mesuré. 2-3 minutes par jour — et regarde la courbe descendre.</div>`+
  RXGAMES.map(g=>{
    const st=rstat(g.id);
    return `<div class="card" style="padding:14px">
      <div style="display:flex;gap:11px;align-items:center">
        <div style="font-size:26px">${g.ico}</div>
        <div style="flex:1"><b style="font-size:15px">${g.name}</b>
          <div style="color:var(--dim);font-size:12.5px;line-height:1.4;margin-top:2px">${g.desc}</div></div>
      </div>
      <div class="rxhud" style="margin-top:10px">
        <span>RECORD <b>${st?st.best+" ms":"—"}</b></span>
        <span>MOY. (10) <b>${st?st.avg+" ms":"—"}</b></span>
        <span>ESSAIS <b>${st?st.n:0}</b></span>
      </div>
      ${spark(g.id)}
      <button class="btn" style="margin-top:10px;padding:11px" onclick="${g.fn}()">Jouer</button>
    </div>`;
  }).join("");
}
function rxCount(cb){
  const a=document.getElementById("arena"); if(!a||!RX) return;
  RX.phase="count";
  const div=document.createElement("div"); div.className="msg";
  div.innerHTML=`<div class="big2" id="rxcd">3</div>`;
  a.appendChild(div);
  let k=3;
  RX.iv=setInterval(()=>{
    if(!document.getElementById("rxcd")){ clearInterval(RX.iv); return; }
    k--;
    if(k<=0){ clearInterval(RX.iv); div.remove(); buzz(60); cb(); }
    else document.getElementById("rxcd").textContent=k;
  },700);
}
function verdictRT(ms){ return ms<200?"Réflexe d'élite.":ms<250?"Très rapide.":ms<300?"Solide.":ms<380?"Correct — ça se travaille.":"Réveille-toi, la balle est déjà passée."; }

// ---- Feu de F1 ----
function playF1(){ rxStop(); RX={g:"f1",tries:[],fs:0,phase:"ready",prevBest:(rstat("f1")||{best:Infinity}).best}; f1Draw("—","Touche la zone pour armer les feux",""); }
function f1Draw(val,hint,cls){
  openOv(ovTop("🏎️ Feu de F1")+`
    <div class="sub">Tape à l'extinction des 5 feux. Taper avant = faux départ. <b>5 départs par session.</b></div>
    <div class="arena" onpointerdown="f1Tap()">
      <div class="msg">
        <div class="lights" id="lts">${"<i></i>".repeat(5)}</div>
        <div class="big2 ${cls}" id="f1v">${val}</div>
        <div class="sub" style="margin:0" id="f1h">${hint}</div>
      </div>
    </div>
    <div class="rxhud"><span>DÉPART <b>${RX.tries.length+1}/5</b></span><span>FAUX DÉPARTS <b>${RX.fs}</b></span><span>${RX.tries.map(t=>t+"ms").join(" · ")||"—"}</span></div>
    <button class="btn ghost" onclick="closeOv()">Quitter</button>`);
}
function f1Tap(){
  if(!RX||RX.g!=="f1") return;
  if(RX.phase==="ready"){
    RX.phase="arming";
    document.getElementById("f1v").textContent="";
    document.getElementById("f1h").textContent="Prêt…";
    const lts=[...document.querySelectorAll("#lts i")];
    let k=0;
    RX.iv=setInterval(()=>{
      if(!document.getElementById("lts")){ rxStop(); return; }
      lts[k].classList.add("on"); k++;
      if(k===5){
        clearInterval(RX.iv);
        RX.to=setTimeout(()=>{
          lts.forEach(x=>x.classList.remove("on"));
          RX.t0=performance.now(); RX.phase="go";
        },800+Math.random()*2000);
      }
    },520);
  } else if(RX.phase==="arming"){
    clearInterval(RX.iv); clearTimeout(RX.to);
    RX.fs++; RX.phase="ready";
    f1Draw("FAUX DÉPART","Comme en course : ça coûte cher. Touche pour recommencer.","bad");
  } else if(RX.phase==="go"){
    const ms=Math.round(performance.now()-RX.t0);
    RX.tries.push(ms); pushReflex("f1",ms);
    if(RX.tries.length>=5) f1End();
    else { RX.phase="ready"; f1Draw(ms+" ms",verdictRT(ms)+" Touche pour le départ suivant.",ms<250?"ok":""); }
  }
}
function f1End(){
  const best=Math.min(...RX.tries), avg=Math.round(RX.tries.reduce((a,b)=>a+b,0)/RX.tries.length);
  const rec=best<RX.prevBest;
  openOv(ovTop("🏎️ Résultat")+`
    <div class="result"><div class="big">${best} ms</div>
    <p>meilleur départ · moyenne ${avg} ms · ${RX.fs} faux départ${RX.fs>1?"s":""}${rec?" · <b style='color:var(--acc)'>RECORD 🏆</b>":""}</p>
    <p>${verdictRT(avg)}</p></div>
    <button class="btn" onclick="playF1()">Rejouer</button>
    <button class="btn ghost" onclick="closeOv()">Fermer</button>`);
  RX=null;
}

// ---- Chasse aux balles ----
function playTgt(){
  rxStop(); RX={g:"t",n:0,total:20,miss:0,sum:0,t0:0};
  openOv(ovTop("🏓 Chasse aux balles")+`
    <div class="sub">20 balles, une à la fois. Touche-les le plus vite possible — les taps à côté comptent contre toi.</div>
    <div class="arena" id="arena" onpointerdown="tgtBg()"></div>
    <div class="rxhud" id="thud"><span>BALLES <b>0/20</b></span><span>À CÔTÉ <b>0</b></span></div>
    <button class="btn ghost" onclick="closeOv()">Quitter</button>`);
  rxCount(tgtNext);
}
function tgtBg(){ if(RX&&RX.g==="t"&&RX.n<RX.total&&document.querySelector(".tgt")){ RX.miss++; tgtHud(); } }
function tgtHud(){ const h=document.getElementById("thud"); if(h&&RX) h.innerHTML=`<span>BALLES <b>${RX.n}/${RX.total}</b></span><span>À CÔTÉ <b>${RX.miss}</b></span>`; }
function tgtNext(){
  if(!RX||RX.g!=="t") return;
  const a=document.getElementById("arena"); if(!a){ rxStop(); return; }
  const old=a.querySelector(".tgt"); if(old) old.remove();
  if(RX.n>=RX.total) return tgtEnd();
  const t=document.createElement("div"); t.className="tgt"; t.textContent="🏓";
  t.style.left=(6+Math.random()*Math.max(10,a.clientWidth-70))+"px";
  t.style.top=(6+Math.random()*Math.max(10,a.clientHeight-70))+"px";
  t.onpointerdown=e=>{ e.stopPropagation(); if(!RX)return; RX.sum+=performance.now()-RX.t0; RX.n++; tgtHud(); tgtNext(); };
  a.appendChild(t); RX.t0=performance.now();
}
function tgtEnd(){
  const avg=Math.round(RX.sum/RX.total), miss=RX.miss;
  pushReflex("targets",avg);
  openOv(ovTop("🏓 Résultat")+`
    <div class="result"><div class="big">${avg} ms</div>
    <p>par balle · ${miss} tap${miss>1?"s":""} à côté</p>
    <p>${avg<550?"Main de compétiteur.":avg<750?"Rapide et propre.":avg<950?"Correct — la précision d'abord, la vitesse suit.":"Les yeux cherchent la balle : ils doivent balayer la zone en continu."}</p></div>
    <button class="btn" onclick="playTgt()">Rejouer</button>
    <button class="btn ghost" onclick="closeOv()">Fermer</button>`);
  RX=null;
}

// ---- Choix CD / Revers ----
function playChoice(){
  rxStop(); RX={g:"c",n:0,total:20,err:0,sum:0,hits:0,phase:"gap"};
  openOv(ovTop("🧭 Choix CD / Revers")+`
    <div class="sub">Balle <b style="color:var(--blu)">bleue</b> → touche la moitié <b>gauche</b> (revers). Balle <b style="color:var(--acc)">orange</b> → moitié <b>droite</b> (coup droit). Taper pendant l'attente = erreur.</div>
    <div class="arena" id="arena" onpointerdown="choiceTap(event)">
      <div class="halfL"></div><div class="halfR"></div>
      <div class="cornerL">◀ REVERS</div><div class="cornerR">COUP DROIT ▶</div>
    </div>
    <div class="rxhud" id="chud"><span>BALLES <b>0/20</b></span><span>ERREURS <b>0</b></span></div>
    <button class="btn ghost" onclick="closeOv()">Quitter</button>`);
  rxCount(choiceGap);
}
function chud(){ const h=document.getElementById("chud"); if(h&&RX) h.innerHTML=`<span>BALLES <b>${RX.n}/${RX.total}</b></span><span>ERREURS <b>${RX.err}</b></span>`; }
function choiceGap(){
  if(!RX||RX.g!=="c") return;
  RX.phase="gap";
  const a=document.getElementById("arena"); if(!a){ rxStop(); return; }
  const s=a.querySelector(".stim"); if(s) s.remove();
  if(RX.n>=RX.total) return choiceEnd();
  RX.to=setTimeout(()=>{
    if(!RX||RX.g!=="c") return;
    const a2=document.getElementById("arena"); if(!a2){ rxStop(); return; }
    RX.side=Math.random()<0.5?"b":"o";
    const st=document.createElement("div"); st.className="stim "+RX.side;
    a2.appendChild(st);
    RX.t0=performance.now(); RX.phase="stim";
  },500+Math.random()*1100);
}
function choiceTap(e){
  if(!RX||RX.g!=="c"||RX.phase==="count") return;
  if(RX.phase==="gap"){ RX.err++; chud(); return; }
  const a=document.getElementById("arena");
  const mid=a.getBoundingClientRect().left+a.clientWidth/2;
  const left=e.clientX<mid;
  const good=(RX.side==="b"&&left)||(RX.side==="o"&&!left);
  if(good){ RX.sum+=performance.now()-RX.t0; RX.hits++; } else RX.err++;
  RX.n++; chud(); choiceGap();
}
function choiceEnd(){
  const avg=RX.hits?Math.round(RX.sum/RX.hits):0, err=RX.err;
  if(RX.hits) pushReflex("choice",avg);
  openOv(ovTop("🧭 Résultat")+`
    <div class="result"><div class="big">${avg} ms</div>
    <p>par bon choix · ${err} erreur${err>1?"s":""}</p>
    <p>${err>4?"Trop d'erreurs : la vitesse sans le bon choix, c'est un smash dans le filet.":avg<420?"Décision d'élite — c'est LE réflexe qui gagne les points au corps.":avg<520?"Très bon. La décision est déjà prise quand la balle arrive.":avg<650?"Correct — décide pendant le vol, pas après le rebond.":"Tu regardes la balle puis tu réfléchis : inverse l'ordre."}</p></div>
    <button class="btn" onclick="playChoice()">Rejouer</button>
    <button class="btn ghost" onclick="closeOv()">Fermer</button>`);
  RX=null;
}

// ---- Go / No-Go ----
function playGng(){
  rxStop(); RX={g:"n",n:0,total:25,fa:0,missed:0,sum:0,hits:0,phase:"gap"};
  openOv(ovTop("🚦 Go / No-Go")+`
    <div class="sub">Balle <b style="color:var(--ok)">verte</b> : tape le plus vite possible. Balle <b style="color:var(--bad)">rouge</b> : ne touche RIEN. 25 balles, environ 1 rouge sur 4.</div>
    <div class="arena" id="arena" onpointerdown="gngTap()"></div>
    <div class="rxhud" id="ghud"><span>BALLES <b>0/25</b></span><span>FAUTES <b>0</b></span><span>RATÉES <b>0</b></span></div>
    <button class="btn ghost" onclick="closeOv()">Quitter</button>`);
  rxCount(gngGap);
}
function ghud(){ const h=document.getElementById("ghud"); if(h&&RX) h.innerHTML=`<span>BALLES <b>${RX.n}/${RX.total}</b></span><span>FAUTES <b>${RX.fa}</b></span><span>RATÉES <b>${RX.missed}</b></span>`; }
function gngGap(){
  if(!RX||RX.g!=="n") return;
  RX.phase="gap";
  const a=document.getElementById("arena"); if(!a){ rxStop(); return; }
  const s=a.querySelector(".stim"); if(s) s.remove();
  if(RX.n>=RX.total) return gngEnd();
  RX.to=setTimeout(()=>{
    if(!RX||RX.g!=="n") return;
    const a2=document.getElementById("arena"); if(!a2){ rxStop(); return; }
    RX.nogo=Math.random()<0.28;
    const st=document.createElement("div"); st.className="stim "+(RX.nogo?"r":"g");
    a2.appendChild(st);
    RX.t0=performance.now(); RX.phase="stim";
    RX.to2=setTimeout(()=>{
      if(!RX||RX.g!=="n"||RX.phase!=="stim") return;
      if(!RX.nogo) RX.missed++;
      RX.n++; ghud(); gngGap();
    },850);
  },500+Math.random()*1200);
}
function gngTap(){
  if(!RX||RX.g!=="n"||RX.phase==="count") return;
  if(RX.phase==="gap"){ RX.fa++; ghud(); return; }
  clearTimeout(RX.to2);
  if(RX.nogo) RX.fa++;
  else { RX.sum+=performance.now()-RX.t0; RX.hits++; }
  RX.n++; ghud(); gngGap();
}
function gngEnd(){
  const avg=RX.hits?Math.round(RX.sum/RX.hits):0, fa=RX.fa, missed=RX.missed;
  if(RX.hits) pushReflex("gonogo",avg);
  openOv(ovTop("🚦 Résultat")+`
    <div class="result"><div class="big">${avg} ms</div>
    <p>sur balles vertes · ${fa} faute${fa>1?"s":""} (rouge tapée ou trop tôt) · ${missed} verte${missed>1?"s":""} ratée${missed>1?"s":""}</p>
    <p>${fa>4?"Tu tapes tout ce qui bouge — en match, ça s'appelle attaquer les balles pièges.":avg<350?"Frein et accélérateur parfaitement séparés. Rare.":avg<450?"Très bon contrôle.":avg<550?"Correct — la retenue coûte encore de la vitesse.":"La peur de la rouge te ralentit sur les vertes : engage-toi, quitte à te tromper."}</p></div>
    <button class="btn" onclick="playGng()">Rejouer</button>
    <button class="btn ghost" onclick="closeOv()">Fermer</button>`);
  RX=null;
}

// ================= BIENVENUE (CADEAU) =================
function welcome(){
  openOv(`<div style="height:8vh"></div>
    <div class="gift">
      <div class="ball">🎁</div>
      <h3>Cette app est un cadeau.</h3>
      <p>Elle a été fabriquée pour <b style="color:var(--acc)">toi</b> : ${DRILLS.length} exercices de niveau compétition, un générateur de séances, ton carnet, tes matchs, la tactique — le tout hors ligne, sans compte, sans pub, à toi pour toujours.</p>
      <p style="margin-top:10px;color:var(--dim);font-size:12.5px">— Thomas 🏓</p>
    </div>
    <label class="f">Ton prénom, champion</label>
    <input type="text" id="wName" placeholder="Prénom">
    <button class="btn" onclick="S.name=document.getElementById('wName').value.trim();S.welcomed=true;save();closeOv();toast('Bienvenue'+(S.name?', '+S.name:'')+' 🏓')">C'est parti</button>`);
}

// ================= INIT =================
if(location.protocol.startsWith("http")&&"serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
nav("seance");
if(!S.welcomed) welcome();
</script>
